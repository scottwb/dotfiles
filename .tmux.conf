# Reload tmux config for easy tinkering
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Large scrollback buffer (preserved across detach/reattach)
set -g history-limit 100000

# Remap prefix from C-b to C-x
unbind C-b
set-option -g prefix C-x
bind-key C-x send-prefix

# Pane splitting/killing like emacs
bind 0 kill-pane
bind 1 kill-pane -a
bind 2 split-window -v
bind 3 split-window -h
unbind x
unbind '"'
unbind %

# Buffer/window management like emacs
bind b choose-tree -Zw           # C-x b = switch buffer (show windows/sessions)
bind k kill-window               # C-x k = kill buffer (kill window)

# Help - show custom cheatsheet
bind h display-popup -E -w 60 -h 28 "less ~/.tmux.cheatsheet.txt"

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# Set terminal title to window title
set-option -g set-titles on

# ============================================================
# Plugins (via TPM - Tmux Plugin Manager)
# ============================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect: save/restore sessions across restarts
set -g @resurrect-capture-pane-contents 'on'

# Continuum: auto-save every 15 min, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
